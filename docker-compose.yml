services:
  toon-dev:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.0}
    volumes:
      - .:/app
    command: ["python", "scripts/smoke_check.py"]
    stdin_open: true
    tty: true
